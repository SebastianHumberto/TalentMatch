<form action="https://formspree.io/{{site.email}}" method="POST">    
<p class="mb-4">Gracias por tu interés. Envíanos tu consulta o CV y nos pondremos en contacto.</p>
<div class="form-group row">
<div class="col-md-6">
<input class="form-control" type="text" name="name" placeholder="Nombre*" required>
</div>
<div class="col-md-6">
<input class="form-control" type="email" name="_replyto" placeholder="Correo electrónico*" required>
</div>
</div>
<textarea rows="8" class="form-control mb-3" name="message" placeholder="Mensaje / Adjunta enlace a tu CV" required></textarea>    
<input class="btn btn-dark" type="submit" value="Enviar">
</form>
